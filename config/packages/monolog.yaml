monolog:
    channels:
        - deprecation
        - acces # journal d'accès / audit RBAC (voir App\EventSubscriber\AccessLogSubscriber)

when@dev:
    monolog:
        handlers:
            main:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                channels: ["!event"]
            acces:
                type: stream
                path: "%kernel.logs_dir%/acces.log"
                level: info
                channels: ["acces"]

when@prod:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                buffer_size: 50
            nested:
                type: stream
                path: php://stderr
                level: debug
                formatter: monolog.formatter.json
            acces:
                type: stream
                path: "%kernel.logs_dir%/acces.log"
                level: info
                channels: ["acces"]
