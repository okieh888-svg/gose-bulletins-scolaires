framework:
    secret: '%env(APP_SECRET)%'
    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        # Déconnexion automatique après inactivité (voir security.yaml : remember_me + session gc)
        gc_maxlifetime: 1800 # 30 minutes d'inactivité -> session expirée
    php_errors:
        log: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
